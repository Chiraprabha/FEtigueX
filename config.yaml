# FEtigueX: Compact Tension (CT) Specimen Configuration

geometry:
  type: "CT"
  L: 1.0                 # Characteristic length
  width_factor: 1.25     # Multiplier for L to get total width
  height_factor: 1.2     # Multiplier for L to get total height
  hole_radius: 0.125     # Radius of loading holes (diameter is 0.25L)
  notch_tip_x: 0.55      # Distance from left edge to the sharp notch tip
  notch_half_width: 0.05 # Half-width of the straight portion of the notch
  notch_angle_vertical: 44.0 # Angle from the VERTICAL axis to the slanted edge (degrees)
  hole_offset: 0.275     # Vertical distance from centerline to hole centers
  x_hole_from_right: 1.0 # Distance from right edge to the center of the loading holes 

mesh:
  output_file: "ct_mesh.msh"
  h_bulk: 0.05          
  h_fine: 0.005         
  refinement_box:
    x_min: 0.50         # Starts slightly behind the V-notch
    x_max: 1.25         # Extends to the right edge
    y_min: 0.55         # Slightly below the crack path
    y_max: 0.65         # Slightly above the crack path
    thickness: 0.05     # Transition zone thickness from fine to coarse

material:
  E: 210e3              # Young's Modulus (MPa)
  nu: 0.3               # Poisson's ratio
  Gc: 2.7               # Critical energy release rate (N/mm)
  l0: 0.015             # Phase-field length scale (h_fine must be < l0/2)